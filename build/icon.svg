<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5B7CFF"/>
      <stop offset="0.55" stop-color="#3A55D8"/>
      <stop offset="1" stop-color="#16215C"/>
    </linearGradient>
    <linearGradient id="belly" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#DCE7FF"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#28324A"/>
      <stop offset="1" stop-color="#141B2E"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E8EDF5"/>
      <stop offset="0.5" stop-color="#B7C2D4"/>
      <stop offset="1" stop-color="#8C99AE"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFE23D"/>
      <stop offset="1" stop-color="#FF9E1B"/>
    </linearGradient>
    <filter id="sh" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="9" stdDeviation="12" flood-color="#0A123A" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Squircle background -->
  <rect x="26" y="26" width="460" height="460" rx="108" fill="url(#bg)"/>
  <rect x="26" y="26" width="460" height="220" rx="108" fill="#FFFFFF" opacity="0.06"/>

  <g filter="url(#sh)">
    <!-- USB metal connector = the penguin's base (pen + drive) -->
    <rect x="212" y="380" width="88" height="70" rx="9" fill="url(#metal)"/>
    <rect x="226" y="398" width="24" height="16" rx="2" fill="#3A455C"/>
    <rect x="262" y="398" width="24" height="16" rx="2" fill="#3A455C"/>
    <rect x="224" y="428" width="64" height="6" rx="3" fill="#6B788F"/>

    <!-- Penguin body -->
    <path d="M256 96
             C328 96 360 170 360 256
             C360 336 322 392 256 392
             C190 392 152 336 152 256
             C152 170 184 96 256 96 Z"
          fill="url(#body)"/>

    <!-- Flippers -->
    <path d="M156 232 C132 258 132 306 150 336 C160 316 162 280 172 258 Z" fill="url(#body)"/>
    <path d="M356 232 C380 258 380 306 362 336 C352 316 350 280 340 258 Z" fill="url(#body)"/>

    <!-- Belly -->
    <path d="M256 150
             C302 150 322 200 322 258
             C322 318 296 358 256 358
             C216 358 190 318 190 258
             C190 200 210 150 256 150 Z"
          fill="url(#belly)"/>

    <!-- Eyes -->
    <ellipse cx="228" cy="196" rx="20" ry="24" fill="#FFFFFF"/>
    <ellipse cx="284" cy="196" rx="20" ry="24" fill="#FFFFFF"/>
    <circle cx="233" cy="200" r="9" fill="#141B2E"/>
    <circle cx="279" cy="200" r="9" fill="#141B2E"/>

    <!-- Beak -->
    <path d="M240 224 L256 210 L272 224 L256 240 Z" fill="url(#bolt)" stroke="#B4610A" stroke-width="2"/>

    <!-- Feet -->
    <path d="M214 372 q-22 8 -30 24 q28 8 46 -4 Z" fill="#FF9E1B"/>
    <path d="M298 372 q22 8 30 24 q-28 8 -46 -4 Z" fill="#FF9E1B"/>
  </g>

  <!-- Flash bolt -->
  <path d="M372 120
           L300 232
           L342 232
           L312 330
           L410 208
           L360 208 Z"
        fill="url(#bolt)" stroke="#16215C" stroke-width="9" stroke-linejoin="round"/>
</svg>
